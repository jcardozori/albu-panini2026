# ─────────────────────────────────────────────────────────────────────────────
# CD — Entrega Continua
# Compila y distribuye la app automáticamente usando EAS Build.
#
# Flujo:
#   develop → EAS "preview" (APK interno para pruebas)
#   main    → EAS "production" (AAB) + EAS Submit → Google Play (draft/internal)
#
# Secretos requeridos en GitHub → Settings → Secrets and variables → Actions:
#   EXPO_TOKEN                    → Token de tu cuenta en expo.dev
#   GOOGLE_PLAY_SERVICE_ACCOUNT_KEY → JSON de cuenta de servicio de Google Play
#
# Proyecto: Laminas WC2026
# ─────────────────────────────────────────────────────────────────────────────

name: CD — EAS Build & Deploy

on:
  push:
    branches:
      - develop
      - main

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: Build Preview (APK) — solo en rama develop
  # ───────────────────────────────────────────────────────────────────────────
  build-preview:
    name: Build Preview (APK interno)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      # 1. Clonar el repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar Node.js 20
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      # 4. Instalar EAS CLI globalmente
      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      # 5. Ejecutar pruebas antes de compilar
      - name: Ejecutar pruebas Jest
        run: npm test -- --ci --forceExit --passWithNoTests

      # 6. Compilar APK con perfil "preview" en EAS
      - name: EAS Build — Preview (APK)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive --no-wait

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: Build Production (AAB) — solo en rama main
  # ───────────────────────────────────────────────────────────────────────────
  build-production:
    name: Build Production (AAB)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      # 1. Clonar el repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar Node.js 20
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      # 4. Instalar EAS CLI globalmente
      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      # 5. Ejecutar pruebas antes de compilar
      - name: Ejecutar pruebas Jest
        run: npm test -- --ci --forceExit --passWithNoTests

      # 6. Compilar AAB con perfil "production" en EAS
      - name: EAS Build — Production (AAB)
        id: eas_build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile production --non-interactive --no-wait

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3: Submit a Google Play — depende del build production
  # Se ejecuta cuando el build anterior finaliza correctamente.
  # ───────────────────────────────────────────────────────────────────────────
  submit-to-play-store:
    name: Submit a Google Play (draft / internal)
    runs-on: ubuntu-latest
    needs: build-production
    if: github.ref == 'refs/heads/main'

    steps:
      # 1. Clonar el repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar Node.js 20
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      # 4. Instalar EAS CLI
      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      # 5. Escribir la clave de cuenta de servicio de Google Play en /tmp/
      #    (eas.json apunta a /tmp/google-play-key.json)
      - name: Escribir clave de cuenta de servicio
        run: echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}' > /tmp/google-play-key.json

      # 6. Submit del último build production a Google Play
      - name: EAS Submit — Google Play
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas submit --platform android --profile production --latest --non-interactive
